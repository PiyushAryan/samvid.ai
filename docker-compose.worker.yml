services:
  contract-worker:
    image: ${WORKER_IMAGE:-ghcr.io/piyusharyan/samvid-contract-worker:latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    env_file:
      - ${WORKER_ENV_FILE:-.env.worker}
    mem_limit: 1536m
    cpus: 1.5
    stop_grace_period: 5m
    tmpfs:
      - /tmp:size=384m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"

  knowledge-index-worker:
    image: ${WORKER_IMAGE:-ghcr.io/piyusharyan/samvid-contract-worker:latest}
    pull_policy: always
    restart: unless-stopped
    init: true
    command: ["contractmate", "knowledge-worker", "--poll-interval", "1"]
    env_file:
      - ${WORKER_ENV_FILE:-.env.worker}
    mem_limit: 1536m
    cpus: 1.5
    stop_grace_period: 5m
    tmpfs:
      - /tmp:size=384m,mode=1777
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
