name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v7

      - name: Install uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b # v8.1.0
        with:
          version: "0.11.17"
          enable-cache: true

      - name: Install Python
        run: uv python install 3.12

      - name: Install backend dependencies
        run: uv sync --locked --extra api --extra dev

      - name: Test backend
        run: uv run pytest

      - name: Install Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci
        working-directory: frontend

      - name: Test frontend
        run: npm test -- --run
        working-directory: frontend

      - name: Build frontend
        run: npm run build
        working-directory: frontend

      - name: Build API production image
        run: docker build --tag samvid:ci .

      - name: Build worker production image
        run: docker build --file Dockerfile.worker --tag samvid-worker:ci .

  publish-worker:
    needs: validate
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - name: Set image name
        run: echo "WORKER_IMAGE=ghcr.io/${GITHUB_REPOSITORY_OWNER,,}/samvid-contract-worker" >> "$GITHUB_ENV"

      - name: Sign in to GHCR
        env:
          GHCR_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: echo "$GHCR_TOKEN" | docker login ghcr.io --username "${{ github.actor }}" --password-stdin

      - name: Build worker image
        run: |
          docker build \
            --file Dockerfile.worker \
            --build-arg REVISION="$GITHUB_SHA" \
            --label "org.opencontainers.image.created=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" \
            --label "org.opencontainers.image.version=$GITHUB_SHA" \
            --platform linux/amd64 \
            --tag "$WORKER_IMAGE:$GITHUB_SHA" \
            --tag "$WORKER_IMAGE:latest" \
            .

      - name: Publish worker image
        run: |
          docker push "$WORKER_IMAGE:$GITHUB_SHA"
          docker push "$WORKER_IMAGE:latest"
