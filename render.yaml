services:
  - type: web
    name: samvid-ai
    runtime: docker
    plan: starter
    region: singapore
    dockerfilePath: ./Dockerfile
    healthCheckPath: /ready
    autoDeployTrigger: checksPass
    maxShutdownDelaySeconds: 60
    disk:
      name: samvid-documents
      mountPath: /app/data
      sizeGB: 10
    envVars:
      - key: APP_ENV
        value: production
      - key: PORT
        value: 8000
      - key: ALLOWED_HOSTS
        value: "*.onrender.com,samvid.ai,www.samvid.ai"
      - key: APP_ACCESS_USERNAME
        value: samvid
      - key: APP_ACCESS_PASSWORD
        generateValue: true
      - key: INBOUND_EMAIL_SECRET
        generateValue: true
      - key: OS_SECURITY_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: samvid-postgres
          property: connectionString
      - key: LOCAL_STORAGE_DIR
        value: /app/data/contracts
      - key: INBOUND_ATTACHMENT_DIR
        value: /app/data/inbound-email
      - key: EMAIL_WORKSPACE_ID
        value: production-workspace
      - key: SAMVID_LOCAL_ACTOR_EMAIL
        value: workspace@samvid.ai
      - key: SAMVID_LOCAL_ACTOR_NAME
        value: Samvid Workspace
      - key: MODEL_PROVIDER
        value: openai
      - key: MODEL_ID
        value: gpt-5-mini
      - key: OPENAI_API_KEY
        sync: false
      - key: ENABLE_OCR
        value: true
      - key: OCR_PROVIDER
        value: sarvam
      - key: SARVAM_API_KEY
        sync: false
      - key: SARVAM_OCR_LANGUAGE
        value: en-IN
      - key: SARVAM_OCR_TIMEOUT_SECONDS
        value: 600
      - key: AUTO_SEND_REVIEW_EMAIL
        value: true
      - key: EMAIL_FROM_ADDRESS
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: ENABLE_TRACING
        value: false
      - key: MAX_FILE_SIZE_MB
        value: 20
      - key: CONTRACT_RETENTION_DAYS
        value: 30

databases:
  - name: samvid-postgres
    plan: basic-256mb
    region: singapore
    databaseName: samvid
    user: samvid
    postgresMajorVersion: "16"
    ipAllowList: []
